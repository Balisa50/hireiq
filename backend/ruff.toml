# Ruff configuration for HireIQ backend
# https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py311"

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "UP",   # pyupgrade
  "N",    # pep8-naming
  "SIM",  # flake8-simplify
  "TCH",  # flake8-type-checking
]
ignore = [
  "E501",   # line-too-long (handled by formatter)
  "B008",   # do not perform function calls in default arguments (FastAPI Depends pattern)
  "N805",   # first argument of a method should be named 'self' (Pydantic validators)
  "UP007",  # use X | Y for type annotations (prefer Optional for clarity)
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
