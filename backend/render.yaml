services:
  - type: web
    name: hireiq-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 65 --timeout-graceful-shutdown 30
    envVars:
      - key: ENVIRONMENT
        value: production
      # config.py reads nvidia_api_key -> NVIDIA_API_KEY. GROQ_API_KEY was the
      # pre-NVIDIA name and nothing reads it, so declaring it here left a fresh
      # deploy with no AI key at all.
      - key: NVIDIA_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://hireiq-ab.vercel.app
      - key: SECRET_KEY
        generateValue: true
